apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: transaction-service-dr
  namespace: skillfybank
spec:
  host: transaction-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: UPGRADE
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
  subsets:
  - name: v1
    labels:
      version: v1
  - name: v2
    labels:
      version: v2
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: transaction-service-vs
  namespace: skillfybank
spec:
  hosts:
  - transaction-service
  http:
  - route:
    - destination:
        host: transaction-service
        subset: v1
      weight: 90
    - destination:
        host: transaction-service
        subset: v2
      weight: 10
    retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: 5xx,reset,connect-failure
