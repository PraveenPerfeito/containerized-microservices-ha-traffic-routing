version: '3.8'

networks:
  skillfybank-net:
    driver: bridge

volumes:
  account-data:

services:
  account-service:
    build:
      context: ./account-service
      dockerfile: Dockerfile
    image: skillfybank/account-service:latest
    container_name: account-service
    ports:
      - "3001:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    networks:
      - skillfybank-net
    volumes:
      - account-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    image: skillfybank/transaction-service:latest
    container_name: transaction-service
    environment:
      - SPRING_PROFILES_ACTIVE=production
    networks:
      - skillfybank-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/transactions/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    image: skillfybank/notification-service:latest
    container_name: notification-service
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
    networks:
      - skillfybank-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
