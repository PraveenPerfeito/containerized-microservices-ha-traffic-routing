apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: skillfybank
  labels:
    app: notification-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
    spec:
      tolerations:
      - key: "notification-only"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      nodeSelector:
        role: notification
      containers:
      - name: notification-service
        image: skillfybank/notification-service:latest
        ports:
        - containerPort: 5000
        env:
        - name: PORT
          value: "5000"
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: skillfybank-config
              key: FLASK_ENV
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
